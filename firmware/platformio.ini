; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:heltec_v3]
extra_scripts = pre:apply_glcdfont.py, post:copy_to_out.py, pre:extra_upload_erase.py
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.04/platform-espressif32.zip
board = heltec_wifi_lora_32_V3
build_src_filter = +<*> -<ui/display_paper/> -<ui/display_tpager.cpp>
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
	jgromes/RadioLib @ ^6.0.0
	adafruit/Adafruit SSD1306 @ ^2.5.0
	adafruit/Adafruit GFX Library @ ^1.11.0
	h2zero/NimBLE-Arduino @ ^2.1.0
	bblanchon/ArduinoJson @ ^7.0.0
	liux-pro/lz4 @ ^0.0.2
	mikalhart/TinyGPSPlus @ ^1.0.0
build_flags = 
	-DCORE_DEBUG_LEVEL=3
	-DCONFIG_MBEDTLS_CHACHA20_C
	-DCONFIG_MBEDTLS_POLY1305_C
	-fexec-charset=UTF-8
	-DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=4096
	-DCONFIG_BT_NIMBLE_LOG_LEVEL=1
	-DCONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED
	-DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
	-DCONFIG_BT_NIMBLE_MAX_BONDS=1
	-DCONFIG_BT_NIMBLE_MAX_CCCDS=2
	-DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=8
	-DARDUINO_LOOP_STACK_SIZE=32768
lib_ldf_mode = chain

