[env:native]
platform = native
; Не задаём lib_extra_dirs=src — иначе LDF тянет весь src/ (Arduino/ESP) и ломает native-тесты.
build_src_filter = -<*> +<protocol/packet.cpp>
build_flags = -Isrc
test_framework = unity
; Иначе pio test не линкует src/ — тесты protocol:: остаются без packet.cpp.
test_build_src = yes

[env:heltec_v3_ota]
extends = env:heltec_v3
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

[env:faketec_v5]
platform = nordicnrf52
board = faketec_v5
board_build.variants_dir = ${PROJECT_DIR}/variants
framework = arduino
build_src_filter = 
	-<*>
	+<faketec/>
	+<protocol/>
	+<compress/>
	-<faketec/main_smoke.cpp>
; Опционально: -DRIFTLINK_LORA_PWR_CYCLE_ON_HARD_RECOVERY=1 — power-cycle LoRa на hard recovery
; Опционально: -DFAKETEC_NRF_WDT_ENABLED=0 — выключить аппаратный watchdog (по умолчанию вкл., ~90 с)
build_flags = 
	-DRIFT_FAKETEC
	-DARDUINO_ARCH_NRF52
	-DCORE_DEBUG_LEVEL=2
	-DNATIVE_LITTLE_ENDIAN
	-DSODIUM_STATIC
	-DCONFIGURED=1
	-DRIFTLINK_DISABLE_BLS_N
	-DRIFTLINK_DISABLE_ESP_NOW
	-DRIFTLINK_SKIP_BLE
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0
upload_speed = 115200
lib_deps =
    jgromes/RadioLib @ ^6.0.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    bblanchon/ArduinoJson @ ^7.0.0
    esphome/libsodium @ ^1.10021.0
    liux-pro/lz4 @ ^0.0.2
    file://lib/riftlink_hsalsa20
lib_extra_dirs =
    lib

[env:faketec_v5_ble]
extends = env:faketec_v5
build_unflags = 
	-DRIFTLINK_SKIP_BLE

; RA-01SH: кварц (не TCXO) + без RF-switch на DIO2.
; ВАЖНО: без ${env:faketec_v5.build_flags} дочерний build_flags ПОЛНОСТЬЮ затирает родительский —
; теряются -DRIFT_FAKETEC, -DCONFIGURED=1 и т.д. → «не заводится» / мусорная сборка.
; Только для модуля RA-01SH (кварц). HT-RA62 с TCXO — обычный env:faketec_v5_ble.
[env:faketec_v5_ble_ra01sh]
extends = env:faketec_v5_ble
build_flags = 
	${env:faketec_v5.build_flags}
	-DLORA_MODULE_HAS_TCXO=0
	-DLORA_DIO2_RF_SWITCH=0

[env:faketec_v5_fs]
extends = env:faketec_v5
build_unflags = 
	-DRIFTLINK_SKIP_INTERNALFS

[env:faketec_v5_smoke]
extends = env:faketec_v5
build_src_filter = 
	-<*>
	+<faketec/main_smoke.cpp>
lib_deps = 
	adafruit/Adafruit TinyUSB Library @ ^3.0.0
