; RiftLink (RL) Firmware — Heltec WiFi LoRa 32
; Платформа: Heltec V3 (ESP32-S3, SX1262) — совместимо с V4
; Arduino 3.x / IDF 5.1 — фиксы WiFi memory leak (PAPER_WIFI_OOM_ANALYSIS.md)

[env:heltec_v3]
extra_scripts = pre:apply_glcdfont.py, post:copy_to_out.py, pre:extra_upload_erase.py
; pioarduino fork: Arduino 3.0.4 + IDF 5.1.4 (фиксы WiFi memory leak)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.04/platform-espressif32.zip
board = heltec_wifi_lora_32_V3
build_src_filter = +<*> -<ui/display_paper/> -<faketec/>
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    jgromes/RadioLib @ ^6.0.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    h2zero/NimBLE-Arduino @ ^2.1.0
    bblanchon/ArduinoJson @ ^7.0.0
    liux-pro/lz4 @ ^0.0.2
    mikalhart/TinyGPSPlus @ ^1.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; Адаптивный SF (7–12) по RSSI соседей. SF_FORCE_7 — только для теста discovery.
    -DCONFIG_MBEDTLS_CHACHA20_C
    -DCONFIG_MBEDTLS_POLY1305_C
    -fexec-charset=UTF-8
    ; NimBLE: см. sdkconfig.defaults — 8K stack, SPIRAM malloc policy
    -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=8192
    -DCONFIG_BT_NIMBLE_LOG_LEVEL=5
    ; loopTask stack overflow при RX (handlePacket + BLE notifyNeighbors)
    -DARDUINO_LOOP_STACK_SIZE=32768

; chain+ ломает поиск Network.h в Arduino 3.0 (espressif/arduino-esp32#9782)
lib_ldf_mode = chain

; Heltec V4 — ESP32-S3R2, 16MB flash, 2MB PSRAM, native USB, пины совместимы с V3
; pioarduino как V3 — единая платформа для V3/V4/V3Paper (Arduino 3.0.4, IDF 5.1.4)
[env:heltec_v4]
extra_scripts = pre:apply_glcdfont.py, post:copy_to_out.py, pre:extra_upload_erase.py
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.04/platform-espressif32.zip
board = heltec_wifi_lora_32_V4
build_src_filter = +<*> -<ui/display_paper/> -<faketec/>
board_build.boards_dir = boards
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    jgromes/RadioLib @ ^6.0.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    h2zero/NimBLE-Arduino @ ^2.1.0
    bblanchon/ArduinoJson @ ^7.0.0
    liux-pro/lz4 @ ^0.0.2
    mikalhart/TinyGPSPlus @ ^1.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; Адаптивный SF (7–12) по RSSI соседей. SF_FORCE_7 — только для теста discovery.
    -DCONFIG_MBEDTLS_CHACHA20_C
    -DCONFIG_MBEDTLS_POLY1305_C
    -fexec-charset=UTF-8
    ; NimBLE: см. sdkconfig.defaults — 8K stack, SPIRAM malloc policy
    -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=8192
    -DCONFIG_BT_NIMBLE_LOG_LEVEL=5
    ; loopTask stack overflow при RX (handlePacket + BLE notifyNeighbors)
    -DARDUINO_LOOP_STACK_SIZE=32768

; chain+ ломает поиск Network.h в Arduino 3.0 (espressif/arduino-esp32#9782)
lib_ldf_mode = chain

[env:heltec_v4_ota]
extends = env:heltec_v4
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

; Heltec V3 Paper / Wireless Paper — ESP32-S3, SX1262, e-paper 2.13" (250x122)
; Пины: CS=4, BUSY=7, DC=5, RST=6, SCLK=3, MOSI=2, VEXT=45
; Автоопределение панели по Chip ID: BN (DEPG0213BN) или B73 (E0213A367-BW)
; Если экран не включается: раскомментируйте -DUSE_EINK_FORCE_B73 (панель V1.2) или -DUSE_EINK_FORCE_BN
[env:heltec_v3_paper]
extends = env:heltec_v3
; V3 Paper: CP2102 USB-UART (не native USB как V4) — Serial через UART0, НЕ включать USB_CDC_ON_BOOT
; CONFIG_DISABLE_HAL_LOCKS — workaround SPI beginTransaction hang (arduino-esp32#7556)
build_flags =
    ${env:heltec_v3.build_flags}
    -DCONFIG_DISABLE_HAL_LOCKS=1
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_MBEDTLS_CHACHA20_C
    -DCONFIG_MBEDTLS_POLY1305_C
    -fexec-charset=UTF-8
    -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=8192
    -DCONFIG_BT_NIMBLE_LOG_LEVEL=5
    -DARDUINO_heltec_wifi_lora_32_V3_Paper
    -DUSE_EINK
    -DARDUINO_LOOP_STACK_SIZE=32768
lib_deps =
    ${env:heltec_v3.lib_deps}
    https://github.com/meshtastic/GxEPD2/archive/c7eb4c3c167cf396ef4f541cc5d4c6aa42f3c46b.zip
build_src_filter = +<*> -<ui/display.cpp> -<faketec/>

[env:heltec_v3_paper_ota]
extends = env:heltec_v3_paper
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

; Native unit tests — protocol/packet (buildPacket, parsePacket)
; Требуется: GCC (MSYS2 на Windows). Запуск: pio test -e native
[env:native]
platform = native
lib_extra_dirs = src
build_src_filter = -<*> +<protocol/packet.cpp>
build_flags = -Isrc
test_framework = unity

; OTA upload — после BLE команды {"cmd":"ota"} устройство создаёт AP RiftLink-OTA
; Подключитесь к WiFi RiftLink-OTA (пароль riftlink123), затем:
;   pio run -t upload -e heltec_v3_ota   или  heltec_v4_ota
[env:heltec_v3_ota]
extends = env:heltec_v3
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

; FakeTech V5 Rev B — nRF52840 (NiceNano) + HT-RA62/RA-01SH LoRa
; Дисплей: автоопределение I2C OLED (опционально)
; Прошивка через USB (двойной клик RST для DFU)
[env:faketec_v5]
platform = nordicnrf52
board = adafruit_feather_nrf52840
framework = arduino
build_src_filter =
    -<*>
    +<faketec/>
    +<protocol/>
build_flags =
    -DRIFT_FAKETEC
    -DARDUINO_ARCH_NRF52
    -DCORE_DEBUG_LEVEL=2
monitor_speed = 115200
upload_speed = 115200
lib_deps =
    jgromes/RadioLib @ ^6.0.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    bblanchon/ArduinoJson @ ^7.0.0

