[env:lilygo_t_lora_pager_ota]
extends = env:lilygo_t_lora_pager
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

; LilyGO T-Beam V1.1 / V1.2 — только OLED + flash 4MB (board lilygo_t_beam_4mb, partitions/t_beam_4mb.csv).
; Радио: авто SX1262 → при CHIP_NOT_FOUND SX1276/RFM9x (см. radio.cpp). OTA: lilygo_t_beam_4mb_ota
[env:lilygo_t_beam_4mb]
extra_scripts = pre:apply_glcdfont.py, post:copy_to_out.py, pre:extra_upload_erase.py
platform = https://github.com/pioarduino/platform-espressif32/releases/download/51.03.04/platform-espressif32.zip
board = lilygo_t_beam_4mb
board_build.partitions = partitions/t_beam_4mb.csv
build_src_filter = +<*> -<ui/display_paper/> -<ui/display_tpager.cpp> -<board/lilygo_tpager.cpp> -<board/bq27220_tpager.cpp>
board_build.boards_dir = boards
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = 
	jgromes/RadioLib @ ^6.0.0
	adafruit/Adafruit SSD1306 @ ^2.5.0
	adafruit/Adafruit GFX Library @ ^1.11.0
	h2zero/NimBLE-Arduino @ ^2.1.0
	bblanchon/ArduinoJson @ ^7.0.0
	liux-pro/lz4 @ ^0.0.2
	mikalhart/TinyGPSPlus @ ^1.0.0
build_flags = 
	-DCORE_DEBUG_LEVEL=3
	-DCONFIG_MBEDTLS_CHACHA20_C
	-DCONFIG_MBEDTLS_POLY1305_C
	-fexec-charset=UTF-8
	-DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=4096
	-DCONFIG_BT_NIMBLE_LOG_LEVEL=1
	-DCONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED
	-DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
	-DCONFIG_BT_NIMBLE_MAX_BONDS=1
	-DCONFIG_BT_NIMBLE_MAX_CCCDS=2
	-DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=8
	; loopTask: 32K как на Heltec давало нехватку DRAM/heap на ESP32; 12K было запасом. 16K — компромисс (следить за Heap после boot).
	-DARDUINO_LOOP_STACK_SIZE=16384
lib_ldf_mode = chain

[env:lilygo_t_beam_4mb_ota]
extends = env:lilygo_t_beam_4mb
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

[env:heltec_v4_ota]
extends = env:heltec_v4
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

[env:heltec_v3_paper]
extends = env:heltec_v3
build_flags = 
	${env:heltec_v3.build_flags}
	-DCONFIG_DISABLE_HAL_LOCKS=1
	-DCORE_DEBUG_LEVEL=3
	-DCONFIG_MBEDTLS_CHACHA20_C
	-DCONFIG_MBEDTLS_POLY1305_C
	-fexec-charset=UTF-8
	-DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=4096
	-DCONFIG_BT_NIMBLE_LOG_LEVEL=1
	-DCONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED
	-DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
	-DCONFIG_BT_NIMBLE_MAX_BONDS=1
	-DCONFIG_BT_NIMBLE_MAX_CCCDS=2
	-DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=8
	-DARDUINO_heltec_wifi_lora_32_V3_Paper
	-DUSE_EINK
	-DARDUINO_LOOP_STACK_SIZE=32768
lib_deps = 
	${env:heltec_v3.lib_deps}
	https://github.com/meshtastic/GxEPD2/archive/c7eb4c3c167cf396ef4f541cc5d4c6aa42f3c46b.zip
build_src_filter = +<*> -<ui/display.cpp> -<ui/display_tpager.cpp>

[env:heltec_v3_paper_ota]
extends = env:heltec_v3_paper
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

[env:native]
platform = native
; Не задаём lib_extra_dirs=src — иначе LDF тянет весь src/ (Arduino/ESP) и ломает native-тесты.
build_src_filter = -<*> +<protocol/packet.cpp>
build_flags = -Isrc
test_framework = unity
; Иначе pio test не линкует src/ — тесты protocol:: остаются без packet.cpp.
test_build_src = yes

[env:heltec_v3_ota]
extends = env:heltec_v3
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123
