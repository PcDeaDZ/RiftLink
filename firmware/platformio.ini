[env:heltec_v3_paper_ota]
extends = env:heltec_v3_paper
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

[env:native]
platform = native
; Не задаём lib_extra_dirs=src — иначе LDF тянет весь src/ (Arduino/ESP) и ломает native-тесты.
build_src_filter = -<*> +<protocol/packet.cpp>
build_flags = -Isrc
test_framework = unity
; Иначе pio test не линкует src/ — тесты protocol:: остаются без packet.cpp.
test_build_src = yes

[env:heltec_v3_ota]
extends = env:heltec_v3
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

; --- nRF52840: FakeTech V5 (HT-RA62), Heltec Mesh Node T114 — см. firmware/src/faketec/README.md ---
[env:nrf52_base]
extra_scripts = pre:extra_nrf_libsodium_sign_include.py
platform = nordicnrf52
board_build.boards_dir = boards
board_build.variants_dir = variants
framework = arduino
monitor_speed = 115200
upload_protocol = nrfutil
build_flags =
	-DRIFTLINK_NRF52=1
	-DRIFTLINK_BLE_JSON_LINE_MAX=2048
	-DLORA_MODULE_HAS_TCXO=1
	-DLORA_DIO2_RF_SWITCH=1
	-DRIFTLINK_DISABLE_BLS_N=1
	-DRIFTLINK_DISABLE_ESP_NOW=1
	-Os
	-std=gnu++17
build_src_filter =
	+<faketec/>
	+<msg_queue/msg_queue.cpp>
	+<packet_fusion/packet_fusion.cpp>
	+<mab/mab.cpp>
	+<frag/frag.cpp>
	+<routing/routing.cpp>
	+<ack_coalesce/ack_coalesce.cpp>
	+<groups/groups.cpp>
	+<offline_queue/offline_queue.cpp>
	+<beacon_sync/beacon_sync.cpp>
	+<clock_drift/clock_drift.cpp>
	+<voice_frag/voice_frag.cpp>
	+<voice_buffers/voice_buffers.cpp>
	+<protocol/packet.cpp>
	+<neighbors/neighbors.cpp>
	+<pkt_cache/pkt_cache.cpp>
	+<duty_cycle/duty_cycle.cpp>
	+<collision_slots/collision_slots.cpp>
	+<compress/compress.cpp>
	+<network_coding/network_coding.cpp>
	+<locale/locale.cpp>
	+<selftest/selftest.cpp>
	-<main.cpp>
	-<async_tasks.cpp>
	-<async_queues.cpp>
	-<radio/radio.cpp>
	-<node/node.cpp>
	-<crypto/crypto.cpp>
	-<region/region.cpp>
	-<ble/ble.cpp>
	-<x25519_keys/x25519_keys.cpp>
; Дисплей (SSD1306/ST7789) подключим отдельно — иначе Wire тянет TinyUSB/SdFat и ломает LDF без полной цепочки Adafruit.
lib_deps =
	jgromes/RadioLib @ ^6.0.0
	bblanchon/ArduinoJson @ ^7.0.0
	esphome/libsodium @ ^1.10021.0
	file://lib/riftlink_sodium_sign
	liux-pro/lz4 @ ^0.0.2
	file://lib/riftlink_hsalsa20
lib_ldf_mode = chain

[env:faketec_v5]
extends = env:nrf52_base
board = faketec_nrf52840
build_flags =
	${env:nrf52_base.build_flags}
	-DRIFTLINK_BOARD_FAKETEC=1

[env:heltec_t114]
extends = env:nrf52_base
board = heltec_mesh_t114
build_flags =
	${env:nrf52_base.build_flags}
	-DRIFTLINK_BOARD_HELTEC_T114=1
