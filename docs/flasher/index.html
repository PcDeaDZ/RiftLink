<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#090a0d" />
    <title>RiftLink — Web Flash Tool</title>
    <meta
      name="description"
      content="Веб-прошивка устройств RiftLink через ESP Web Tools"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script
      type="module"
      src="https://unpkg.com/esp-web-tools@10.1.0/dist/web/install-button.js?module"
    ></script>
  </head>
  <body>
    <div class="bg-surface" aria-hidden="true">
      <canvas id="meshCanvas" class="mesh-canvas" width="300" height="150"></canvas>
      <div class="bg-gradient"></div>
      <div class="bg-grid"></div>
    </div>

    <header class="site-header">
      <div class="shell site-header__inner">
        <a class="brand-lockup" href="https://github.com/PcDeaDZ/RiftLink" target="_blank" rel="noopener noreferrer">
          <img
            id="brandLogo"
            src="./assets/app_icon.png"
            width="40"
            height="40"
            alt="RiftLink"
          />
          <div class="brand-lockup__text">
            <span class="brand-lockup__name">RiftLink</span>
            <span class="brand-lockup__product" id="productLine"></span>
          </div>
        </a>

        <nav class="site-nav" id="siteNav" aria-label="">
          <a id="navGithub" class="site-nav__link" href="https://github.com/PcDeaDZ/RiftLink" target="_blank" rel="noopener noreferrer"></a>
          <a id="navReleases" class="site-nav__link" href="https://github.com/PcDeaDZ/RiftLink/releases" target="_blank" rel="noopener noreferrer"></a>
          <a id="navDocs" class="site-nav__link" href="https://github.com/PcDeaDZ/RiftLink/tree/master/docs" target="_blank" rel="noopener noreferrer"></a>
        </nav>

        <div id="langSwitch" class="lang-switch" role="group" aria-label="">
          <button id="langRu" type="button" class="lang-button">RU</button>
          <button id="langEn" type="button" class="lang-button">EN</button>
        </div>
      </div>
    </header>

    <main class="shell main-flow">
      <div class="layout-split">
        <div class="col-main">
          <section class="workflow panel panel--hero" aria-labelledby="titleText">
            <p class="eyebrow" id="workflowEyebrow"></p>
            <h1 id="titleText" class="workflow__title">Web Flash Tool</h1>
            <p id="subtitleText" class="workflow__lead"></p>

            <ol class="flash-steps" id="flashSteps" aria-label="">
              <li class="flash-step">
                <span class="flash-step-num" aria-hidden="true">1</span>
                <span class="flash-step-text" id="step1Text"></span>
              </li>
              <li class="flash-step">
                <span class="flash-step-num" aria-hidden="true">2</span>
                <span class="flash-step-text" id="step2Text"></span>
              </li>
              <li class="flash-step">
                <span class="flash-step-num" aria-hidden="true">3</span>
                <span class="flash-step-text" id="step3Text"></span>
              </li>
            </ol>

            <div class="env-badges" id="envBadges" aria-live="polite"></div>

            <div class="controls">
              <label id="deviceLabel" class="field-label" for="deviceSelect"></label>
              <select id="deviceSelect" class="field-select">
                <option value="heltec-v3"></option>
                <option value="heltec-v4" selected></option>
                <option value="heltec-v3-paper"></option>
                <option value="lilygo-t-lora-pager"></option>
                <option value="lilygo-t-beam"></option>
              </select>
            </div>

            <div id="deviceMeta" class="device-meta"></div>
            <p id="deviceHint" class="device-hint" hidden></p>

            <div class="install-box">
              <esp-web-install-button id="installButton"></esp-web-install-button>
            </div>

            <div class="info manifest-line" id="manifestInfo"></div>
            <p class="minor-note" id="eraseNote"></p>
          </section>

          <section class="panel about-box">
            <h2 id="aboutTitle" class="section-heading"></h2>
            <p id="aboutLead" class="about-lead"></p>
            <div class="about-grid">
              <article class="about-item">
                <h3 id="aboutFeature1Title"></h3>
                <p id="aboutFeature1Text"></p>
              </article>
              <article class="about-item">
                <h3 id="aboutFeature2Title"></h3>
                <p id="aboutFeature2Text"></p>
              </article>
              <article class="about-item">
                <h3 id="aboutFeature3Title"></h3>
                <p id="aboutFeature3Text"></p>
              </article>
            </div>
          </section>

          <section class="panel roadmap-box">
            <h2 id="roadmapTitle" class="section-heading"></h2>
            <p id="roadmapLead" class="roadmap-lead"></p>
            <ul id="roadmapList" class="roadmap-list"></ul>
          </section>

          <section class="panel tips">
            <h2 id="tipsTitle" class="section-heading"></h2>
            <ul class="tips-list">
              <li id="tip1"></li>
              <li id="tip2"></li>
              <li id="tip3"></li>
            </ul>
          </section>
        </div>

        <aside class="col-side col-side--sticky">
          <section class="panel release-box">
            <h2 id="latestReleaseTitle" class="section-heading"></h2>
            <div class="release-kpis" id="releaseKpis" role="group" aria-label="">
              <div class="release-kpi">
                <span class="release-kpi-label" id="releaseTagLabel"></span>
                <strong class="release-kpi-value" id="releaseTag">...</strong>
              </div>
              <div class="release-kpi">
                <span class="release-kpi-label" id="firmwareLabel"></span>
                <strong class="release-kpi-value" id="firmwareVersion">...</strong>
              </div>
              <div class="release-kpi">
                <span class="release-kpi-label" id="appLabel"></span>
                <strong class="release-kpi-value" id="appVersion">...</strong>
              </div>
            </div>
            <a
              id="apkDownloadLink"
              class="apk-button"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-disabled="true"
            ></a>
          </section>

          <section class="panel notes-box">
            <h2 id="whatsNewTitle" class="section-heading"></h2>
            <ul id="whatsNewList" class="notes-list"></ul>
          </section>

          <section class="panel faq-box">
            <h2 id="faqTitle" class="section-heading"></h2>
            <details>
              <summary id="faqQ1"></summary>
              <p id="faqA1"></p>
            </details>
            <details>
              <summary id="faqQ2"></summary>
              <p id="faqA2"></p>
            </details>
            <details>
              <summary id="faqQ3"></summary>
              <p id="faqA3"></p>
            </details>
          </section>

          <footer class="footer-box">
            <p id="footerTitle" class="footer-title"></p>
            <div class="footer-links">
              <a id="footerLinkIssues" class="footer-link" href="https://github.com/PcDeaDZ/RiftLink/issues" target="_blank" rel="noopener noreferrer"></a>
              <a id="footerLinkReleases" class="footer-link" href="https://github.com/PcDeaDZ/RiftLink/releases" target="_blank" rel="noopener noreferrer"></a>
              <a id="footerLinkRepo" class="footer-link" href="https://github.com/PcDeaDZ/RiftLink" target="_blank" rel="noopener noreferrer"></a>
              <a id="footerLinkTelegram" class="footer-link" href="https://t.me/+aScoNiTHdMM2MWMy" target="_blank" rel="noopener noreferrer"></a>
            </div>
          </footer>
        </aside>
      </div>
    </main>

    <footer class="site-footer">
      <div class="shell site-footer__inner">
        <p class="site-footer__fine" id="footerFinePrint"></p>
      </div>
    </footer>

    <script type="module" src="./mesh-background.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
