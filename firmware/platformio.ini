; RiftLink (RL) Firmware — Heltec WiFi LoRa 32
; Платформа: Heltec V3 (ESP32-S3, SX1262) — совместимо с V4

[env:heltec_v3]
extra_scripts = pre:apply_glcdfont.py, post:copy_to_out.py, pre:extra_upload_erase.py
platform = espressif32
board = heltec_wifi_lora_32_V3
build_src_filter = +<*> -<ui/display_paper/>
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps =
    jgromes/RadioLib @ ^6.0.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    h2zero/NimBLE-Arduino @ ^2.1.0
    bblanchon/ArduinoJson @ ^7.0.0
    liux-pro/lz4 @ ^0.0.2
    mikalhart/TinyGPSPlus @ ^1.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; SF_FORCE_7 — временно: фикс SF7 для теста discovery. Закомментируй после теста.
    -DSF_FORCE_7
    -DCONFIG_MBEDTLS_CHACHA20_C
    -DCONFIG_MBEDTLS_POLY1305_C
    -fexec-charset=UTF-8
    ; NimBLE: увеличен стек — Heltec перезагружается при BLE connect (Stack canary nimble_host)
    -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=20480
    -DCONFIG_BT_NIMBLE_LOG_LEVEL=5
    ; loopTask stack overflow при RX (handlePacket + BLE notifyNeighbors)
    -DARDUINO_LOOP_STACK_SIZE=32768

lib_ldf_mode = chain+

; Heltec V4 SAFE — конфиг V3 (8MB) + USB CDC. Работает на V4 (использует первые 8MB).
; Используйте если heltec_v4 не загружается.
[env:heltec_v4_safe]
extra_scripts = pre:apply_glcdfont.py, post:copy_to_out.py, pre:extra_upload_erase.py
platform = espressif32
board = heltec_wifi_lora_32_V3
build_src_filter = +<*> -<ui/display_paper/>
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    jgromes/RadioLib @ ^6.0.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    h2zero/NimBLE-Arduino @ ^2.1.0
    bblanchon/ArduinoJson @ ^7.0.0
    liux-pro/lz4 @ ^0.0.2
    mikalhart/TinyGPSPlus @ ^1.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; SF_FORCE_7 — временно: фикс SF7 для теста discovery. Закомментируй после теста.
    -DSF_FORCE_7
    -DCONFIG_MBEDTLS_CHACHA20_C
    -DCONFIG_MBEDTLS_POLY1305_C
    -fexec-charset=UTF-8
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_heltec_wifi_lora_32_V4
    -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=20480
    -DCONFIG_BT_NIMBLE_LOG_LEVEL=5
    ; loopTask stack overflow при RX (handlePacket + BLE notifyNeighbors)
    -DARDUINO_LOOP_STACK_SIZE=32768

lib_ldf_mode = chain+

; Heltec V4 — ESP32-S3R2, 16MB flash, 2MB PSRAM, native USB, пины совместимы с V3
[env:heltec_v4]
extra_scripts = pre:apply_glcdfont.py, post:copy_to_out.py, pre:extra_upload_erase.py
platform = espressif32
board = heltec_wifi_lora_32_V4
build_src_filter = +<*> -<ui/display_paper/>
board_build.boards_dir = boards
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    jgromes/RadioLib @ ^6.0.0
    adafruit/Adafruit SSD1306 @ ^2.5.0
    adafruit/Adafruit GFX Library @ ^1.11.0
    h2zero/NimBLE-Arduino @ ^2.1.0
    bblanchon/ArduinoJson @ ^7.0.0
    liux-pro/lz4 @ ^0.0.2
    mikalhart/TinyGPSPlus @ ^1.0.0

build_flags =
    -DCORE_DEBUG_LEVEL=3
    ; SF_FORCE_7 — временно: фикс SF7 для теста discovery. Закомментируй после теста.
    -DSF_FORCE_7
    -DCONFIG_MBEDTLS_CHACHA20_C
    -DCONFIG_MBEDTLS_POLY1305_C
    -fexec-charset=UTF-8
    ; NimBLE: увеличен стек — Heltec перезагружается при BLE connect (Stack canary nimble_host)
    -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=20480
    -DCONFIG_BT_NIMBLE_LOG_LEVEL=5
    ; loopTask stack overflow при RX (handlePacket + BLE notifyNeighbors)
    -DARDUINO_LOOP_STACK_SIZE=32768
    ; Debug: hex dump всех RX пакетов (убрать после сессии)
    -DDEBUG_PACKET_DUMP

lib_ldf_mode = chain+

[env:heltec_v4_ota]
extends = env:heltec_v4
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

[env:heltec_v4_safe_ota]
extends = env:heltec_v4_safe
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

; Heltec V3 Paper / Wireless Paper — ESP32-S3, SX1262, e-paper 2.13" (250x122)
; Пины: CS=4, BUSY=7, DC=5, RST=6, SCLK=3, MOSI=2, VEXT=45
; Автоопределение панели по Chip ID: BN (DEPG0213BN) или B73 (E0213A367-BW)
; Если экран не включается: раскомментируйте -DUSE_EINK_FORCE_B73 (панель V1.2) или -DUSE_EINK_FORCE_BN
[env:heltec_v3_paper]
extends = env:heltec_v3
lib_deps =
    ${env:heltec_v3.lib_deps}
    https://github.com/meshtastic/GxEPD2/archive/c7eb4c3c167cf396ef4f541cc5d4c6aa42f3c46b.zip
build_src_filter = +<*> -<ui/display.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DSF_FORCE_7
    ; Meshtastic-style: автоопределение FC1(V1.1) / E0213A367(V1.2). Раскомментируйте при проблемах:
    ; -DUSE_EINK_FORCE_BN   ; панель V1.0 DEPG0213BN
    ; -DUSE_EINK_FORCE_B73  ; принудительно E0213A367
    -DCONFIG_MBEDTLS_CHACHA20_C
    -DCONFIG_MBEDTLS_POLY1305_C
    -fexec-charset=UTF-8
    -DCONFIG_BT_NIMBLE_HOST_TASK_STACK_SIZE=20480
    -DCONFIG_BT_NIMBLE_LOG_LEVEL=5
    -DARDUINO_heltec_wifi_lora_32_V3_Paper
    -DUSE_EINK
    ; loopTask stack overflow при RX (handlePacket + BLE + displayUpdate)
    -DARDUINO_LOOP_STACK_SIZE=32768
    ; Debug: hex dump всех RX пакетов (убрать после сессии)
    -DDEBUG_PACKET_DUMP

[env:heltec_v3_paper_ota]
extends = env:heltec_v3_paper
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

; OTA upload — после BLE команды {"cmd":"ota"} устройство создаёт AP RiftLink-OTA
; Подключитесь к WiFi RiftLink-OTA (пароль riftlink123), затем:
;   pio run -t upload -e heltec_v3_ota   или  heltec_v4_ota
[env:heltec_v3_ota]
extends = env:heltec_v3
upload_protocol = espota
upload_port = 192.168.4.1
upload_flags = --auth=riftlink123

